name: Release Homebrew tap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: homebrew-${{ github.ref }}
  cancel-in-progress: false

env:
  TAP_REPOSITORY: modiqo/homebrew-tap
  FORMULA_PATH: Formula/cliare.rb

jobs:
  update-tap:
    name: Update Homebrew formula
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Invalid release tag: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          path: cliare

      - name: Verify tag matches crate version
        working-directory: cliare
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "cliare") | .version')"
          if [[ "${version}" != "${{ steps.release.outputs.version }}" ]]; then
            echo "Tag ${{ steps.release.outputs.tag }} does not match Cargo.toml version ${version}."
            exit 1
          fi

      - name: Compute source archive SHA-256
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/modiqo/cliare/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz"
          curl -fsSL "${url}" -o cliare-source.tar.gz
          sha256="$(sha256sum cliare-source.tar.gz | awk '{print $1}')"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          echo "sha256=${sha256}" >> "${GITHUB_OUTPUT}"

      - name: Verify Homebrew tap token is configured
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "Missing HOMEBREW_TAP_TOKEN repository secret."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "homebrew-tap/Formula"
          cp "cliare/packaging/homebrew/cliare.rb" "homebrew-tap/${FORMULA_PATH}"
          sed -i \
            -e "s#https://github.com/modiqo/cliare/archive/refs/tags/v[0-9][0-9.]*[.]tar[.]gz#${{ steps.archive.outputs.url }}#g" \
            -e "s#REPLACE_WITH_SHA256#${{ steps.archive.outputs.sha256 }}#g" \
            -e "s#cliare [0-9][0-9.]*#cliare ${{ steps.release.outputs.version }}#g" \
            "homebrew-tap/${FORMULA_PATH}"

      - name: Commit formula update
        working-directory: homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "cliare ${{ steps.release.outputs.version }}"
          git push
