name: Release crates.io

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"

concurrency:
  group: crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy, rustfmt

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo pkgid -p cliare | sed 's/.*[#@]//')"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$tag" != "$version" ]]; then
            echo "Tag v${tag} does not match Cargo.toml version ${version}."
            exit 1
          fi

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: env RUSTC_WRAPPER= cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Verify package file sets
        shell: bash
        run: |
          set -euo pipefail
          for package in \
            cliare-core \
            cliare-runtime \
            cliare-policy \
            cliare-issues \
            cliare-inference \
            cliare-evidence \
            cliare-shape \
            cliare-context \
            cliare-cli \
            cliare-score \
            cliare-report \
            cliare-eval \
            cliare-guidance \
            cliare-measure \
            cliare-inspect \
            cliare-app \
            cliare
          do
            cargo package --locked --list -p "${package}" > /dev/null
          done

      - name: Verify crates.io token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "Missing CARGO_REGISTRY_TOKEN repository secret."
            exit 1
          fi

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATES_IO_USER_AGENT: modiqo-cliare-release/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          crate_version_status() {
            local package="$1"
            local version="$2"
            local body="${RUNNER_TEMP:-/tmp}/crates-${package}-${version}.json"
            curl -sS -L \
              -H "User-Agent: ${CRATES_IO_USER_AGENT}" \
              -o "${body}" \
              -w "%{http_code}" \
              "https://crates.io/api/v1/crates/${package}/${version}"
          }

          publish_crate() {
            local package="$1"
            local version="$2"
            local log="${RUNNER_TEMP:-/tmp}/cargo-publish-${package}-${version}.log"

            cargo publish --locked -p "${package}" --dry-run

            if cargo publish --locked -p "${package}" 2>&1 | tee "${log}"; then
              return 0
            fi

            if grep -Eqi 'already (exists|uploaded)|crate version .* is already uploaded' "${log}"; then
              echo "${package} ${version} already exists on crates.io after publish attempt; skipping"
              return 0
            fi

            if grep -Eqi 'Too Many Requests|rate.?limit' "${log}"; then
              echo "crates.io rate limited ${package} ${version}; waiting 15 minutes before one retry" >&2
              sleep 900
              cargo publish --locked -p "${package}"
              return 0
            fi

            return 1
          }

          for package in \
            cliare-core \
            cliare-runtime \
            cliare-policy \
            cliare-issues \
            cliare-inference \
            cliare-evidence \
            cliare-shape \
            cliare-context \
            cliare-cli \
            cliare-score \
            cliare-report \
            cliare-eval \
            cliare-guidance \
            cliare-measure \
            cliare-inspect \
            cliare-app \
            cliare
          do
            pkgid="$(cargo pkgid -p "${package}")"
            version="${pkgid##*@}"
            if [[ "${version}" == "${pkgid}" ]]; then
              version="${pkgid##*#}"
            fi

            status="$(crate_version_status "${package}" "${version}")"
            case "${status}" in
              200)
                echo "${package} ${version} already exists on crates.io; skipping"
                continue
                ;;
              404)
                ;;
              *)
                echo "Unexpected crates.io response for ${package} ${version}: HTTP ${status}" >&2
                exit 1
                ;;
            esac

            publish_crate "${package}" "${version}"
            sleep 90
          done
